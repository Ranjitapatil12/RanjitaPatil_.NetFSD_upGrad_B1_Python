<!DOCTYPE html>
<html>
<head>

<title>Dashboard</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header class="header">
<h1>E-Learning Dashboard</h1>
</header>

<nav class="navbar">
<a href="Dashboard.html">Dashboard</a>
<a href="Courses.html">Courses</a>
<a href="Quiz.html">Quiz</a>
<a href="Profile.html">Profile</a>
</nav>


<p class="breadcrumb">Home > <span>Dashboard</span></p>

<main class="container mt-4">

<section class="stats-section">

<div class="stat-card">
<i class="bi bi-book-half stat-icon"></i>
<h3 id="courseCount">0</h3>
<p>Courses Available</p>
</div>

<div class="stat-card">
<i class="bi bi-pencil-square stat-icon"></i>
<h3 id="quizAttempts">0</h3>
<p>Quiz Attempts</p>
</div>

<div class="stat-card">
<i class="bi bi-graph-up-arrow stat-icon"></i>
<h3 id="avgScore">0%</h3>
<p>Average Score</p>
</div>

</section>

<section class="dashboard-grid">

<div class="course-card">
<i class="bi bi-code-slash course-icon"></i>
<h4>HTML Basics</h4>

<progress id="htmlProgress" value="70" max="100"></progress>
<p id="htmlText">70% Completed</p>

</div>

<div class="course-card">
<i class="bi bi-palette course-icon"></i>
<h4>CSS Layout</h4>

<progress id="cssProgress" value="50" max="100"></progress>
<p id="cssText">50% Completed</p>

</div>

<div class="course-card">
<i class="bi bi-filetype-js course-icon"></i>
<h4>JavaScript</h4>

<progress id="jsProgress" value="30" max="100"></progress>
<p id="jsText">30% Completed</p>

</div>

</section>

</main>

<footer class="text-center mt-4 mb-3">
<p>© 2026 E-Learning Platform</p>
</footer>

<script src="js/dashboard.js"></script>

</body>
</html>
